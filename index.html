<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genetix Arena V3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        space: {
                            black: '#050505',
                            dark: '#0a0a0a',
                            panel: '#111111',
                            border: '#333333',
                            text: '#e5e5e5',
                            accent: '#ffffff',
                            ally: '#10b981', // Emerald 500
                            enemy: '#ef4444', // Red 500
                            healer: '#3b82f6', // Blue 500
                            obstacle: '#f59e0b', // Amber 500
                        }
                    },
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, #222 1px, transparent 1px), linear-gradient(to bottom, #222 1px, transparent 1px)"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 0.97;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.98;
            }
        }

        /* Signal Loss Animations */
        @keyframes static-noise {
            0% {
                transform: translate(0, 0);
            }

            10% {
                transform: translate(-5%, -5%);
            }

            20% {
                transform: translate(-10%, 5%);
            }

            30% {
                transform: translate(5%, -10%);
            }

            40% {
                transform: translate(-5%, 15%);
            }

            50% {
                transform: translate(-10%, 5%);
            }

            60% {
                transform: translate(15%, 0);
            }

            70% {
                transform: translate(0, 10%);
            }

            80% {
                transform: translate(-15%, 0);
            }

            90% {
                transform: translate(10%, 5%);
            }

            100% {
                transform: translate(5%, 0);
            }
        }

        .animate-static-noise {
            animation: static-noise 0.2s steps(1) infinite;
        }

        @keyframes scan-fast {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 100%;
            }
        }

        .animate-scan-fast {
            animation: scan-fast 1s linear infinite;
        }

        @keyframes glitch-blocks {
            0% {
                opacity: 0;
                transform: scaleY(1);
            }

            5% {
                opacity: 0.5;
                transform: scaleY(1.5) skewX(20deg);
            }

            10% {
                opacity: 0;
                transform: scaleY(1);
            }

            50% {
                opacity: 0;
            }

            55% {
                opacity: 0.8;
                transform: scaleX(1.5) skewX(-20deg);
            }

            60% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        .animate-glitch-blocks {
            animation: glitch-blocks 0.5s steps(1) infinite;
        }

        @keyframes rgb-shift {
            0% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-2px, 1px);
            }

            40% {
                transform: translate(2px, -1px);
            }

            60% {
                transform: translate(-1px, 2px);
            }

            80% {
                transform: translate(1px, -2px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .animate-rgb-shift {
            animation: rgb-shift 0.1s steps(2) infinite;
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0"
  }
}
</script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
